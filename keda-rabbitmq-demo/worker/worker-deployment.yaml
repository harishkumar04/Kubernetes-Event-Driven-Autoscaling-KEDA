apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker
  namespace: keda-demo

spec:

  replicas: 1

  selector:
    matchLabels:
      app: worker

  template:

    metadata:
      labels:
        app: worker

    spec:

      containers:

      - name: worker

        image: worker:v1

        imagePullPolicy: IfNotPresent
